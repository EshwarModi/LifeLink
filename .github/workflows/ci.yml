name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      FLASK_ENV: testing
      FLASK_DEBUG: "0"
      SECRET_KEY: ci-test-secret-key-not-for-production
      DATABASE_URL: sqlite:///test.db

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install without psycopg2-binary (not needed for SQLite CI tests)
          pip install Flask==2.3.3 Flask-SQLAlchemy==3.0.5 Flask-Migrate==4.0.4 \
            Werkzeug==2.3.7 SQLAlchemy==2.0.33 python-dotenv==1.0.0 pytest==7.4.2

      - name: Run tests
        run: pytest tests/ -v --tb=short
